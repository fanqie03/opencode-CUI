server:
  port: 8081

spring:
  application:
    name: ai-gateway

  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_AI_GATEWAY_DB:ai_gateway}?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf-8&allowPublicKeyRetrieval=true
    username: root
    password: Root@123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      password: 
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 50
          max-idle: 20
          min-idle: 5

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.opencode.cui.gateway.model
  configuration:
    map-underscore-to-camel-case: true

# Gateway custom configuration
gateway:
  # Skill Server WebSocket endpoint
  skill-server:
    ws-url: ${SKILL_SERVER_WS_URL:ws://localhost:8082/ws/internal/gateway}
    internal-token: ${SKILL_SERVER_INTERNAL_TOKEN:sk-intl-9f2a7d3e4b1c}
    reconnect-initial-delay-ms: 1000
    reconnect-max-delay-ms: 30000

  # Agent heartbeat timeout
  agent:
    heartbeat-timeout-seconds: 90
    heartbeat-check-interval-seconds: 30

  # AK/SK auth
  auth:
    timestamp-tolerance-seconds: 300
    nonce-ttl-seconds: 300

opencode:
  logging:
    base-dir: ${OPENCODE_LOG_DIR:D:/02_Lab/Logs}
    file: ${AI_GATEWAY_LOG_FILE:${opencode.logging.base-dir}/ai-gateway/ai-gateway.log}
    archive-dir: ${AI_GATEWAY_LOG_ARCHIVE_DIR:${opencode.logging.base-dir}/ai-gateway/archive}

logging:
  file:
    name: ${opencode.logging.file}
  level:
    com.opencode.cui.gateway: DEBUG
    org.springframework.web.socket: INFO
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  logback:
    rollingpolicy:
      file-name-pattern: ${AI_GATEWAY_LOG_ARCHIVE_PATTERN:${opencode.logging.archive-dir}/ai-gateway.%d{yyyy-MM-dd}.%i.log.gz}
      max-file-size: ${AI_GATEWAY_LOG_MAX_FILE_SIZE:20MB}
      max-history: ${AI_GATEWAY_LOG_MAX_HISTORY:30}
      total-size-cap: ${AI_GATEWAY_LOG_TOTAL_SIZE_CAP:2GB}
      clean-history-on-start: ${AI_GATEWAY_LOG_CLEAN_HISTORY_ON_START:false}
