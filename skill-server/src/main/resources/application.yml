server:
  port: 8082

spring:
  threads:
    virtual:
      enabled: true
  application:
    name: skill-server

  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_SKILL_DB:skill_db}?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf-8&allowPublicKeyRetrieval=true
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:Root@123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1800000
      connection-timeout: 10000

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:0}
      password: ${REDIS_PASSWORD:}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 200
          max-idle: 50
          min-idle: 10

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.opencode.cui.skill.model
  configuration:
    map-underscore-to-camel-case: true

# WebSocket configuration
skill:
  snowflake:
    epoch-ms: ${SKILL_SNOWFLAKE_EPOCH_MS:1735689600000}
    service-code: ${SKILL_SNOWFLAKE_SERVICE_CODE:1}
    worker-id: ${SKILL_SNOWFLAKE_WORKER_ID:1}
    service-bits: ${SKILL_SNOWFLAKE_SERVICE_BITS:4}
    worker-bits: ${SKILL_SNOWFLAKE_WORKER_BITS:10}
    sequence-bits: ${SKILL_SNOWFLAKE_SEQUENCE_BITS:12}
    clock-backwards-strategy: ${SKILL_SNOWFLAKE_CLOCK_BACKWARDS_STRATEGY:WAIT}
    max-backward-ms: ${SKILL_SNOWFLAKE_MAX_BACKWARD_MS:5}
  websocket:
    # Allowed origins for Skill miniapp WebSocket connections
    allowed-origins: ${CORS_ORIGINS:*}
  gateway:
    ws-url: ${SKILL_GATEWAY_WS_URL:ws://localhost:8081/ws/skill}
    connection-count: ${SKILL_GATEWAY_CONNECTION_COUNT:8}
    # Internal token for Skill Server -> AI-Gateway authentication
    internal-token: ${SKILL_SERVER_INTERNAL_TOKEN:changeme}
    reconnect-initial-delay-ms: 1000
    reconnect-max-delay-ms: 30000
  im:
    # IM platform API base URL for sending messages
    api-url: ${IM_API_URL:http://localhost:9999}
    token: ${IM_TOKEN:}
    inbound-token: ${IM_INBOUND_TOKEN:e2e-test-token}
    reply-state-ttl-minutes: 30
  assistant:
    resolve-url: ${ASSISTANT_RESOLVE_URL:http://localhost:9999/assistant-api/integration/v4-1/we-crew/instance/query}
    resolve-token: ${ASSISTANT_RESOLVE_TOKEN:}
    # DEPRECATED: use status-cache-ttl-*-seconds instead; retained for backward compat, no longer read at runtime
    cache-ttl-minutes: 30
    # existence 状态缓存双 TTL（统一 key assistantAccount:status:<account>）
    status-cache-ttl-exists-seconds: ${ASSISTANT_STATUS_CACHE_TTL_EXISTS_SECONDS:300}
    status-cache-ttl-not-exists-seconds: ${ASSISTANT_STATUS_CACHE_TTL_NOT_EXISTS_SECONDS:60}
    # miniapp 三入口 null/blank assistantAccount 处理开关：true=跳过放行（默认）；false=严格 400
    existence-check:
      skip-on-null-assistant-account: ${ASSISTANT_EXISTENCE_CHECK_SKIP_ON_NULL:true}
    # 助理删除后对外统一文案（集中化以便调整）
    deletion-message: ${ASSISTANT_DELETION_MESSAGE:该助理已被删除}
  context:
    injection-enabled: ${SKILL_CONTEXT_INJECTION_ENABLED:true}
    templates:
      group-chat: ${SKILL_CONTEXT_GROUP_CHAT_TEMPLATE:classpath:templates/group-chat-prompt.txt}
    max-history-messages: ${SKILL_CONTEXT_MAX_HISTORY_MESSAGES:20}
  message-history:
    cache-ttl-seconds: ${SKILL_MESSAGE_HISTORY_CACHE_TTL_SECONDS:30}
    warm-sizes: ${SKILL_MESSAGE_HISTORY_WARM_SIZES:50}
    refresh:
      core-pool-size: ${SKILL_MESSAGE_HISTORY_REFRESH_CORE_POOL_SIZE:2}
      max-pool-size: ${SKILL_MESSAGE_HISTORY_REFRESH_MAX_POOL_SIZE:4}
      queue-capacity: ${SKILL_MESSAGE_HISTORY_REFRESH_QUEUE_CAPACITY:200}
  relay:
    # Threshold in seconds before an owner instance is considered dead for takeover
    owner-dead-threshold-seconds: ${SKILL_RELAY_OWNER_DEAD_THRESHOLD_SECONDS:120}
    # route_confirm dedup (lease-based): suppress redundant control-plane confirms to ai-gateway
    confirm-dedup:
      # Kill switch — set to false to revert to per-message confirm (pre-dedup behavior)
      enabled: ${SKILL_RELAY_CONFIRM_DEDUP_ENABLED:true}
      # Cache TTL (must be < GW UpstreamRoutingTable expireAfterWrite=30min)
      cache-expire-minutes: ${SKILL_RELAY_CONFIRM_DEDUP_CACHE_EXPIRE_MINUTES:25}
  session:
    # Idle timeout in minutes before a session is marked IDLE
    idle-timeout-minutes: 30
    # Cleanup interval in minutes for scheduled IDLE session cleanup
    cleanup-interval-minutes: 10
    auto-create-timeout-seconds: ${SKILL_SESSION_AUTO_CREATE_TIMEOUT_SECONDS:30}
    rebuild-max-attempts: ${SKILL_SESSION_REBUILD_MAX_ATTEMPTS:3}
    rebuild-cooldown-seconds: ${SKILL_SESSION_REBUILD_COOLDOWN_SECONDS:30}
  assistant-info:
    api-url: ${ASSISTANT_INFO_API_URL:http://localhost:9999/appstore/wecodeapi/open/ak/info}
    api-token: ${ASSISTANT_INFO_API_TOKEN:}
    cache-ttl-seconds: ${ASSISTANT_INFO_CACHE_TTL_SECONDS:300}
  assistant-id:
    enabled: ${SKILL_ASSISTANT_ID_ENABLED:true}
    target-tool-type: ${SKILL_ASSISTANT_ID_TARGET_TOOL_TYPE:assistant}
    persona-base-url: ${SKILL_ASSISTANT_ID_PERSONA_BASE_URL:}
    cache-ttl-minutes: ${SKILL_ASSISTANT_ID_CACHE_TTL_MINUTES:30}
    match-ak: ${SKILL_ASSISTANT_ID_MATCH_AK:false}
  delivery:
    mode: ${SKILL_DELIVERY_MODE:rest}
    invoke-source-ttl-seconds: ${SKILL_DELIVERY_INVOKE_SOURCE_TTL_SECONDS:300}
    registry-ttl-seconds: ${SKILL_DELIVERY_REGISTRY_TTL_SECONDS:30}
    registry-heartbeat-interval-ms: ${SKILL_DELIVERY_REGISTRY_HEARTBEAT_INTERVAL_MS:10000}

opencode:
  logging:
    base-dir: ${OPENCODE_LOG_DIR:D:/02_Lab/Logs}
    file: ${SKILL_SERVER_LOG_FILE:${opencode.logging.base-dir}/skill-server/skill-server.log}
    archive-dir: ${SKILL_SERVER_LOG_ARCHIVE_DIR:${opencode.logging.base-dir}/skill-server/archive}

logging:
  file:
    name: ${opencode.logging.file}
  level:
    com.opencode.cui.skill: INFO
    org.springframework.web.socket: INFO
  # pattern 和 rollingpolicy 已迁移到 log4j2-spring.xml
