server:
  port: 8082

spring:
  application:
    name: skill-server

  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_SKILL_DB:skill_db}?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf-8&allowPublicKeyRetrieval=true
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:Root@123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1800000
      connection-timeout: 10000

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:0}
      password: ${REDIS_PASSWORD:}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 50
          max-idle: 20
          min-idle: 5

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.opencode.cui.skill.model
  configuration:
    map-underscore-to-camel-case: true

# WebSocket configuration
skill:
  websocket:
    # Allowed origins for Skill miniapp WebSocket connections
    allowed-origins: ${CORS_ORIGINS:*}
  gateway:
    # Internal token for AI-Gateway <-> Skill Server authentication
    internal-token: ${SKILL_SERVER_INTERNAL_TOKEN:sk-intl-9f2a7d3e4b1c}
  im:
    # IM platform API base URL for sending messages
    api-url: ${IM_API_URL:http://localhost:8080/api/im}
  session:
    # Idle timeout in minutes before a session is marked IDLE
    idle-timeout-minutes: 30
    # Cleanup interval in minutes for scheduled IDLE session cleanup
    cleanup-interval-minutes: 10

opencode:
  logging:
    base-dir: ${OPENCODE_LOG_DIR:D:/02_Lab/Logs}
    file: ${SKILL_SERVER_LOG_FILE:${opencode.logging.base-dir}/skill-server/skill-server.log}
    archive-dir: ${SKILL_SERVER_LOG_ARCHIVE_DIR:${opencode.logging.base-dir}/skill-server/archive}

logging:
  file:
    name: ${opencode.logging.file}
  level:
    com.opencode.cui.skill: DEBUG
    org.springframework.web.socket: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  logback:
    rollingpolicy:
      file-name-pattern: ${SKILL_SERVER_LOG_ARCHIVE_PATTERN:${opencode.logging.archive-dir}/skill-server.%d{yyyy-MM-dd}.%i.log.gz}
      max-file-size: ${SKILL_SERVER_LOG_MAX_FILE_SIZE:20MB}
      max-history: ${SKILL_SERVER_LOG_MAX_HISTORY:30}
      total-size-cap: ${SKILL_SERVER_LOG_TOTAL_SIZE_CAP:2GB}
      clean-history-on-start: ${SKILL_SERVER_LOG_CLEAN_HISTORY_ON_START:false}
