server:
  port: 8082

spring:
  application:
    name: skill-server

  datasource:
    url: jdbc:mariadb://localhost:3306/skill_db?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8mb4
    username: root
    password: ${DB_PASSWORD:root}
    driver-class-name: org.mariadb.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1800000
      connection-timeout: 10000

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 50
          max-idle: 20
          min-idle: 5

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.opencode.cui.skill.model
  configuration:
    map-underscore-to-camel-case: true

# WebSocket configuration
skill:
  websocket:
    # Allowed origins for Skill miniapp WebSocket connections
    allowed-origins: ${CORS_ORIGINS:*}
  gateway:
    # Internal token for AI-Gateway <-> Skill Server authentication
    internal-token: ${SKILL_SERVER_INTERNAL_TOKEN:sk-intl-9f2a7d3e4b1c}
  im:
    # IM platform API base URL for sending messages
    api-url: ${IM_API_URL:http://localhost:8080/api/im}
  session:
    # Idle timeout in minutes before a session is marked IDLE
    idle-timeout-minutes: 30
    # Cleanup interval in minutes for scheduled IDLE session cleanup
    cleanup-interval-minutes: 10

logging:
  level:
    com.opencode.cui.skill: DEBUG
    org.springframework.web.socket: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
